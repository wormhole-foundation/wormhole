[package]
name = "mock-pausable"
version = "0.1.0"
description = "Mock pausable target program for WormholePauser tests"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "mock_pausable"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]


[dependencies]
anchor-lang = { version = "0.31.1", features = ["init-if-needed"] }
